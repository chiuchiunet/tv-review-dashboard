<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 評論創作室</title>
    <style>
        :root {
            --bg-primary: #15151e;
            --bg-secondary: #1e1e2e;
            --bg-card: #252538;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #e10600;
            --success: #00ff88;
            --border: #333350;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #1a1a2e 100%);
            padding: 2rem;
            border-bottom: 3px solid var(--accent);
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--text-secondary); }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 0.6rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .filters input { flex: 1; min-width: 200px; }
        
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .article-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }
        .article-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .article-card .platform {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .article-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .article-card .meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .article-card .preview {
            color: var(--text-secondary);
            margin-top: 0.75rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        /* Article Detail View */
        .article-detail {
            display: none;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid var(--border);
        }
        .article-detail.active { display: block; }
        .back-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .back-btn:hover { border-color: var(--accent); }
        .article-detail h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .article-detail .meta {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .article-detail .content {
            line-height: 1.8;
            font-size: 1rem;
        }
        .article-detail .content p { margin-bottom: 1rem; }
        .article-detail .content h4 {
            margin: 1.5rem 0 0.5rem;
            color: var(--accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .filters { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📺 TV <span>評論創作室</span></h1>
        <p>HK Television Reviews Archive</p>
    </header>

    <main class="container" id="mainView">
        <div class="filters">
            <select id="platformFilter">
                <option value="">全部平台</option>
                <option value="TVB">TVB</option>
                <option value="ViuTV">ViuTV</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜尋文章...">
        </div>
        <div class="article-list" id="articleList">
            <div class="empty-state">載入中...</div>
        </div>
    </main>

    <main class="container" id="detailView">
        <button class="back-btn" onclick="showList()">← 返回列表</button>
        <div id="articleContent"></div>
    </main>

    <script>
        // Articles data - 呢度會之後 load 外界 data
        const articles = [
            {
                id: 1,
                title: "《正义女神》— TVB 的「创新」又一次胎死腹中？",
                platform: "TVB",
                date: "2026-03-19",
                focus: "題材定位 + 劇本深度 + 節奏問題",
                preview: "《正义女神》卡士强劲——佢诗曼回归，陈炜、谭耀文坐镇，再加上「《新闻女王》班底」呢个卖点...",
                content: `
<p><strong>《正义女神》卡士强劲</strong>——佢诗曼回归，陈炜、谭耀文坐镇，再加上「《新闻女王》班底」呢个卖点，听落就知系TVB既年度大制作。但睇完之后，你会发现问题唔系出在演员，而系出在剧本本身。</p>

<h4>题材定位：想讲法律，结果讲哂感情</h4>
<p>套剧打正旗号系「法律剧」，但睇落去，你会发现佢更似一套「情感剧」。案件本身应该有既法律辩论、道德抉择，全部让路俾主角既内心挣扎。呢个唔系话情感元素唔可以加，而系当法律桥段变成「推进感情既工具」，套剧既专业性就自然流失。观众想睇既系法庭上既攻防，实际睇到既系office入边既情感纠葛。</p>

<h4>节奏：时快时慢，唔系大问题，但反映出结构失衡</h4>
<p>开场两集的确几紧凑——案件推进快、人物交代也算清晰。但进入中段后，问题就开始浮现。一来就系大案点题，跟住落去就变成单元形式，每集搞一个细case。呢种处理唔算错，但细节明显唔够——案件来得快，去得更快，观众根本冇时间投入。有啲案件处理得太表面，仿佛只系为咗「带出」主角既情感线咁。</p>

<h4>演员：有新鲜感，但角色深度不足</h4>
<p>新面孔既加入绝对系好消息。马贯东、蒋祖曼呢啲新面孔确实为套剧带来啲生气。但问题在于，角色设定本身就缺乏深度——新人既功能往往只系「推动剧情」，而非「成为剧情」。TVB 呢几年既问题就系咁：唔系冇新人，而系唔知点样用新人。</p>

<h4>总结</h4>
<p>《正义女神》并非烂剧，佢有亮点——演员表现OK、题材有社会意义。但呢套剧既问题，其实就系 TVB 呢几年既缩影：想突破，但每一步都走得战战竞竞，最终变成「有啲嘢睇，但唔系好好睇」。如果要再进一步，TVB 需要既唔系再搵多啲「第二个佢诗曼」，而系真真正正去諗：究竟观众想睇乜？</p>
`
            },
            {
                id: 2,
                title: "《臥底嬌娃》— TVB 既「轻」之过？",
                platform: "TVB",
                date: "2026-03-19",
                focus: "班底實力 + 市場定位 + 製作野心",
                preview: "《臥底嬌娃》（前名《特勤女团》），由方骏钊监制、邵丽琼编审，张曦雯，陈瀅、罗毓仪、马贯东等主演...",
                content: `
<p><strong>《臥底嬌娃》</strong>（前名《特勤女团》），由方骏钊监制、邵丽琼编审，张曦雯，陈瀅、罗毓仪、马贯东等主演。题材本身有啲諗头——卧底女团、轻松动作喜剧，方向摆明系想吸年轻观众。但睇完成套剧，你会发现问题唔系方向，而系——班底撑唔起。</p>

<h4>班底：有人，但未有足够既说服力</h4>
<p>张曦雯，陈瀅、罗毓仪呢啲新面孔，颜值OK，亦落力。但当一套剧既成败取决于「卧底」呢个题材既张力既时候，问题就出现——呢班演员，暂时未有足够既气场去 carry 咁复杂既角色设定。你会见到佢地好落力，但畀你既感觉就只系「努力但未够」。呢个唔系演技问题，而系——TVB 既新一批演员，仲未有足够既代表作去建立观众既信任。</p>

<h4>市场定位：本地定内地？一个两边都唔到岸既选择</h4>
<p>呢套剧既「轻」，从制作到卡士都feel 到——佢唔系大制作，明显系针对本地观众既轻喜剧。但与此同时，佢既题材（卧底、警匪）又唔系内地观众特别buy 既类型。呢种「想做本地，但又眼金金望住内地市场」既心态，正正就系TVB既死症——唔知自己做紧俾边个睇。</p>

<h4>制作野心：有心，但力不足</h4>
<p>要拍卧底题材，需要足够既情节张力、人物复杂度，同理应既制作资源。但呢套剧畀人既感觉就系「想做但做唔出」——案件设定偏简单、人物关系冇乜层次、节奏亦欠缺紧张感。呢啲唔系态度问题，而系——TVB 既制作资源同班底，暂时未能咁样烧。</p>

<h4>总结</h4>
<p>《臥底嬌娃》既问题，唔系「做得差」，而系「力有不逮」。当平台既班底未够，当市场定位仍然模糊，呢啲所谓既「新尝试」，最终只会变成「缩水版既失望」。TVB 而家最需要既，唔系再拍几多套呢啲「轻装剧」，而系真真正正諗清楚——边个先系自己既观众？</p>
`
            }
        ];

        // Render articles
        function renderArticles(filteredArticles) {
            const list = document.getElementById('articleList');
            
            if (filteredArticles.length === 0) {
                list.innerHTML = '<div class="empty-state">暫時未有文章</div>';
                return;
            }

            list.innerHTML = filteredArticles.map(article => `
                <div class="article-card" onclick="showArticle(${article.id})">
                    <span class="platform">${article.platform}</span>
                    <h3>${article.title}</h3>
                    <div class="meta">📅 ${article.date} | 🔍 ${article.focus}</div>
                    <p class="preview">${article.preview}</p>
                </div>
            `).join('');
        }

        // Filter articles
        function filterArticles() {
            const platform = document.getElementById('platformFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = articles.filter(article => {
                const matchPlatform = !platform || article.platform === platform;
                const matchSearch = !search || 
                    article.title.toLowerCase().includes(search) ||
                    article.focus.toLowerCase().includes(search);
                return matchPlatform && matchSearch;
            });
            
            renderArticles(filtered);
        }

        // Show article detail
        function showArticle(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;
            
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            
            document.getElementById('articleContent').innerHTML = `
                <span class="platform">${article.platform}</span>
                <h2>${article.title}</h2>
                <div class="meta">📅 ${article.date} | 🔍 ${article.focus}</div>
                <div class="content">${article.content}</div>
            `;
            
            window.scrollTo(0, 0);
        }

        // Show list
        function showList() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
        }

        // Event listeners
        document.getElementById('platformFilter').addEventListener('change', filterArticles);
        document.getElementById('searchInput').addEventListener('input', filterArticles);

        // Initial render
        renderArticles(articles);
    </script>
</body>
</html>
