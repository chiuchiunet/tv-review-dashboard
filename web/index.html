<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 創作室 Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;600;700&family=Noto+Serif+HK:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #0F0F0F;
            --sidebar-text: #FAFAF8;
            --sidebar-text-muted: #71717A;
            --sidebar-accent: #3F3F46;
            
            --main-bg: #FAFAF8;
            --main-text: #18181B;
            --main-text-muted: #71717A;
            --main-border: #E5E5E0;
            --card-bg: #FFFFFF;
            
            --accent-tv: #DC2626;
            --accent-kpop: #8B5CF6;
            
            --font-heading: 'Noto Serif HK', serif;
            --font-body: 'Noto Sans HK', sans-serif;
            
            --sidebar-width: 300px;
            --content-max: 1200px;
        }
        
        [data-theme="dark"] {
            --sidebar-bg: #0A0A0A;
            --sidebar-text: #FAFAF8;
            --sidebar-text-muted: #71717A;
            --sidebar-accent: #27272A;
            
            --main-bg: #18181B;
            --main-text: #FAFAF8;
            --main-text-muted: #A1A1AA;
            --main-border: #3F3F46;
            --card-bg: #1F1F23;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--main-bg);
            color: var(--main-text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: background 0.4s ease;
        }
        
        .sidebar-brand {
            margin-bottom: 48px;
        }
        
        .sidebar-brand h1 {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--sidebar-text);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        
        .sidebar-brand .date {
            color: var(--sidebar-text-muted);
            font-size: 0.875rem;
            font-weight: 400;
        }
        
        /* Content Type Toggle */
        .content-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            background: var(--sidebar-accent);
            padding: 6px;
            border-radius: 12px;
        }
        
        .toggle-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: var(--sidebar-text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .toggle-btn:hover {
            color: var(--sidebar-text);
        }
        
        .toggle-btn.active {
            background: var(--card-bg);
            color: var(--main-text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .toggle-btn.active.tv { background: var(--accent-tv); color: white; }
        .toggle-btn.active.kpop { background: var(--accent-kpop); color: white; }
        
        /* Platform Filters */
        .filter-section {
            margin-bottom: 32px;
        }
        
        .filter-label {
            color: var(--sidebar-text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        
        .platform-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .platform-btn {
            padding: 8px 14px;
            border: 1px solid var(--sidebar-accent);
            background: transparent;
            color: var(--sidebar-text-muted);
            font-size: 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .platform-btn:hover {
            border-color: var(--sidebar-text-muted);
            color: var(--sidebar-text);
        }
        
        .platform-btn.active {
            background: var(--sidebar-text);
            border-color: var(--sidebar-text);
            color: var(--sidebar-bg);
        }
        
        /* Stats */
        .sidebar-stats {
            margin-top: auto;
            padding-top: 32px;
            border-top: 1px solid var(--sidebar-accent);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .stat-item {
            padding: 16px;
            background: var(--sidebar-accent);
            border-radius: 10px;
        }
        
        .stat-value {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--sidebar-text);
            line-height: 1;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--sidebar-text-muted);
        }
        
        /* Theme Toggle */
        .theme-btn {
            position: absolute;
            top: 40px;
            right: 32px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .theme-btn:hover { opacity: 1; }
        
        /* ===== MAIN CONTENT ===== */
        .main {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding: 48px 64px;
        }
        
        .content-header {
            max-width: var(--content-max);
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--main-border);
        }
        
        .content-header h2 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        
        .content-header .subtitle {
            color: var(--main-text-muted);
            font-size: 1rem;
        }
        
        /* Article Grid */
        .articles-container {
            max-width: var(--content-max);
        }
        
        .article-grid {
            display: grid;
            gap: 32px;
        }
        
        /* Article Card */
        .article-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .article-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-tv);
            transition: width 0.35s ease;
        }
        
        .article-card.kpop::before {
            background: var(--accent-kpop);
        }
        
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-color: var(--main-border);
        }
        
        .article-card:hover::before {
            width: 6px;
        }
        
        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .type-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 6px;
            background: var(--accent-tv);
            color: white;
        }
        
        .type-tag.kpop {
            background: var(--accent-kpop);
        }
        
        .platform-tag {
            font-size: 0.8rem;
            color: var(--main-text-muted);
            font-weight: 500;
        }
        
        .article-card h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
            color: var(--main-text);
        }
        
        .article-card .date {
            font-size: 0.85rem;
            color: var(--main-text-muted);
            margin-bottom: 16px;
        }
        
        .article-card .preview {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--main-text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent-tv);
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.3s ease;
        }
        
        .article-card.kpop .read-more { color: var(--accent-kpop); }
        
        .article-card:hover .read-more {
            opacity: 1;
            transform: translateX(0);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--main-text-muted);
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--main-text);
        }
        
        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            opacity: 1;
            overflow-y: auto;
            padding: 48px;
        }
        
        .modal-content {
            background: var(--main-bg);
            border-radius: 20px;
            max-width: 760px;
            width: 100%;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .modal-overlay.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }
        
        .modal-header {
            padding: 48px 48px 32px;
            border-bottom: 1px solid var(--main-border);
        }
        
        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border: none;
            background: var(--main-border);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--main-text);
        }
        
        .modal-close:hover {
            background: var(--main-text);
            color: var(--main-bg);
        }
        
        .modal-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .modal-platform {
            display: inline-block;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 6px;
            background: var(--accent-tv);
            color: white;
        }
        
        .modal-platform.kpop {
            background: var(--accent-kpop);
        }
        
        .modal-date {
            color: var(--main-text-muted);
            font-size: 0.9rem;
        }
        
        .modal-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.01em;
        }
        
        .modal-body {
            padding: 40px 48px 48px;
        }
        
        .modal-body .content {
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--main-text);
        }
        
        .modal-body .content h3 {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 600;
            margin: 36px 0 16px;
        }
        
        .modal-body .content h4 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 28px 0 12px;
        }
        
        .modal-body .content p {
            margin-bottom: 20px;
        }
        
        .modal-body .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 0.9rem;
        }
        
        .modal-body .content table th,
        .modal-body .content table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--main-border);
        }
        
        .modal-body .content table th {
            font-weight: 600;
            background: var(--card-bg);
        }
        
        .modal-body .content ul, 
        .modal-body .content ol {
            margin: 16px 0;
            padding-left: 24px;
        }
        
        .modal-body .content li {
            margin-bottom: 8px;
        }
        
        .modal-body .content hr {
            border: none;
            border-top: 1px solid var(--main-border);
            margin: 32px 0;
        }
        
        .modal-body .content blockquote {
            border-left: 4px solid var(--accent-tv);
            padding-left: 20px;
            margin: 24px 0;
            font-style: italic;
            color: var(--main-text-muted);
        }
        
        .modal-body .content strong {
            font-weight: 600;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .article-card {
            animation: fadeInUp 0.5s ease forwards;
        }
        
        .article-card:nth-child(1) { animation-delay: 0.05s; }
        .article-card:nth-child(2) { animation-delay: 0.1s; }
        .article-card:nth-child(3) { animation-delay: 0.15s; }
        .article-card:nth-child(4) { animation-delay: 0.2s; }
        .article-card:nth-child(5) { animation-delay: 0.25s; }
        .article-card:nth-child(6) { animation-delay: 0.3s; }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }
            .main {
                margin-left: 260px;
                padding: 32px 40px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 24px;
            }
            .main {
                margin-left: 0;
                padding: 24px;
            }
            .sidebar-stats {
                display: none;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        
        <div class="sidebar-brand">
            <h1>🎬 創作室</h1>
            <p class="date">電視評論 · K-Pop · 2026-04-08</p>
        </div>
        
        <div class="content-toggle">
            <button class="toggle-btn tv active" onclick="filterByType('all')">全部</button>
            <button class="toggle-btn tv" onclick="filterByType('tv')">📺 TV</button>
            <button class="toggle-btn kpop" onclick="filterByType('kpop')">🎤 K-Pop</button>
        </div>
        
        <div class="filter-section">
            <p class="filter-label">平台</p>
            <div class="platform-filters" id="platformFilter">
                <button class="platform-btn active" onclick="filterByPlatform('all')">全部</button>
            </div>
        </div>
        
        <div class="sidebar-stats">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">13</div>
                    <div class="stat-label">總內容</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">11</div>
                    <div class="stat-label">TV 評論</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">2</div>
                    <div class="stat-label">K-Pop</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">8</div>
                    <div class="stat-label">平台</div>
                </div>
            </div>
        </div>
    </aside>
    
    <main class="main">
        <div class="content-header">
            <h2 id="pageTitle">全部內容</h2>
            <p class="subtitle" id="pageSubtitle">13 篇精選文章</p>
        </div>
        
        <div class="articles-container">
            <div class="article-grid" id="articleList"></div>
        </div>
    </main>
    
    <div class="modal-overlay" id="articleModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModalDirect()">×</button>
            <div class="modal-header">
                <div class="modal-meta">
                    <span class="modal-platform" id="modalPlatform"></span>
                    <span class="modal-date" id="modalDate"></span>
                </div>
                <h2 class="modal-title" id="modalTitle"></h2>
            </div>
            <div class="modal-body">
                <div class="content" id="modalContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-btn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
            }
        }
        
        // Articles data
        const articles = [
            {
                id: 0,
                title: "《唱錢》與香港音樂節目的十字路口",
                platform: "TVB/ViuTV",
                content_type: "tv",
                date: "2026-04-08",
                tags: ['香港電視, 音樂節目, TVB, ViuTV, 粵語流行曲, 行業分析'],
                preview: "上週 TVB 推出新節目《唱錢》，形式係音樂闖關遊戲——素人唱歌俾 AI 評分系統挑戰，難度分 Monster 級，獎金最高十萬。主持係森美、Eric Kwok、李茵彤。嘉賓有側田呢種出道多年嘅歌手，佢自己都話：「唱歌從此變得有對錯。」呢個...",
                content: `<p>上週 TVB 推出新節目《唱錢》，形式係音樂闖關遊戲——素人唱歌俾 AI 評分系統挑戰，難度分 Monster 級，獎金最高十萬。主持係森美、Eric Kwok、李茵彤。嘉賓有側田呢種出道多年嘅歌手，佢自己都話：「唱歌從此變得有對錯。」</p><p>呢個節目嘅出現，其實係香港音樂節目多年收縮之後，少有嘅「原創音樂遊戲節目」。</p><p>
香港音樂節目嘅輝煌，係跟隨粵語流行曲黃金期而生。七、八十年代，無綫電視（TVB）幾乎壟斷晒所有音樂宣傳渠道。歌手出新歌，必需上 TVB 节目《勁歌金曲》做宣傳，否則就冇曝光。**TVB 係唯一嘅遊戲規則制定者。**</p><p>當年《勁歌金曲》唔單止係音樂節目，係整個香港流行文化工業鏈嘅核心。歌手走紅次序、頒獎禮結局，某程度上都係喺呢個生態內決定。</p><p>
2011 年至 2014 年間，爆發 **HKRIA 版權風波**（Hong Kong Record Industry Association）。三大國際唱片公司（Sony、EMI、Universal）因為版權費問題，同 TVB 鬧翻，集體抽起旗下歌手喺 TVB 嘅節目亮相。</p><p>呢個係一個分水嶺——**歌手唔再需要被迫靠 TVB 宣傳**，TVB 對樂壇嘅控制力開始瓦解。版權風波最終以曾志偉 2021 年回歸 TVB 重新破冰告終，但流失嘅時間同生態已經補唔番。</p><p>
2019 年，ViuTV 推出《Chill Club》，形勢逆轉。</p><p>《Chill Club》同 TVB 傳統音樂節目嘅最大分別：</p><p>| | TVB 主流做法 | ViuTV《Chill Club》 |
|---|---|---|
| **歌曲選擇** | 懷舊為主（《流行經典50年》） | 新歌優先 |
| **歌手風格** | 熟面孔、穩定派 | 年輕歌手、 indie 風格 |
| **節目生態** | 依附唱片公司制度 | 自建排行榜「Chill Club 推介榜」 |
| **意識形態** | 保守，唔敢踩線 | 2019 年後容許藝人表達政治立場 |</p><p>林一峰曾經同一晚同時亮相 TVB《流行經典50年》（唱 90 年代舊歌）同 ViuTV《Chill Club》（唱新歌同自己作品），年輕觀眾嘅反應清晰不過——**大家想聽新嘢，唔係回帶**。</p><p>2020 年，香港正式踏入 **「五台時代」**——TVB、ViuTV、商台、港台、家卡通，五個渠道各有各做，TVB 不再係唯一。ViuTV 更有專屬排行榜，等於另起爐灶。</p><p>
面對競爭，TVB 嘅策略係不斷裁撤同整合：</p><p>- **《勁歌金曲》停播**（2021 年左右），後分拆為《勁歌金榜》環節

《唱錢》係 TVB 少有嘅**原創音樂遊戲節目**，概念係結合唱歌能力測試同獎金刺激嘅互動形式。呢個唔係傳統意義上嘅「音樂节目」，但佢成功做到：</p><p>1. **娛樂性**：遊戲元素令觀眾有參與感
2. **音樂性**：唔係齋靠顏值，要有真功夫先過到關
3. **話題性**：十萬獎金得主、側田被考起，已成熱話</p><p>但我哋亦要問：**呢個係咪代表 TVB 喺音樂節目上嘅真正轉向？** 定還只係一次性嘅創意實驗？</p><p>
香港音樂節目面對嘅困境，唔單止係電視台之間嘅競爭，係成個流行工業嘅結構性問題：</p><p>- **歌手出道渠道單一**：以往靠 TVB，忽然變成靠 MIRROR 效应同 social media
- **粵語流行曲市場萎縮**：大灣區政策機遇同時間，本地創作者數量未能補足
- **音樂工業收入模式改變**：streaming 平台崛起，但香港未建立完善嘅本土音樂生態
- **政治環境影響**：意識形態限制令創作者有所顧忌</p><p>
香港音樂節目現時處於一個微妙位置：**唔再係昔日嘅單一霸權，但亦未搵到新嘅可持續模式**。</p><p>ViuTV 靠 MIRROR 效應同《Chill Club》建立咗自己嘅音樂地盤，但 2025-2026 年廣告收益倒退，反映單靠偶像經濟唔係長遠之计。TVB 靠《新聞女王 2》止血轉賺，但音樂節目依然係弱勢。</p><p>《唱錢》嘅出現，證明 **觀眾對有質素嘅原創音樂節目依然有需求**——關鍵係 TVB 願唔願意持續投資，仲係只係當佢係一次性嘅收視實驗？</p><p>香港樂壇要真正復甦，需要嘅唔止係一個《唱錢》，係成個工業鏈——從培訓、製作、宣傳到變現——都需要重新梳理。而電視節目，只係呢個生態入面其中一個環節。</p><p>---</p><p>*延伸話題：MIRROR 效應到底帶動咗幾多本地音樂工業投資？ViuTV 2026 年嘅「團體演唱會」規劃係咪能夠逆轉？香港樂壇係咪需要一個新嘅「電視黃金時代」定係壓根兒就唔再需要電視？呢啲問題，值得繼續觀察。*</p> `
