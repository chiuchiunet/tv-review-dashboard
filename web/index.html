<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV 評論創作室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;600;700&family=Noto+Serif+HK:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sidebar - 永遠深色 */
            --sidebar-bg: #18181B;
            --sidebar-text: #FAFAF8;
            --sidebar-text-muted: #A1A1AA;
            
            /* Main Content - 淺色模式 */
            --main-bg-light: #FAFAF8;
            --main-text-light: #18181B;
            --main-text-muted-light: #71717A;
            
            /* Main Content - 深色模式 */
            --main-bg-dark: #18181B;
            --main-text-dark: #FAFAF8;
            --main-text-muted-dark: #A1A1AA;
            
            /* Accent */
            --accent: #DC2626;
            --accent-hover: #B91C1C;
            
            /* 當前模式 */
            --bg-main: var(--main-bg-light);
            --text-main: var(--main-text-light);
            --text-muted: var(--main-text-muted-light);
            
            /* Typography */
            --font-heading: 'Noto Serif HK', serif;
            --font-body: 'Noto Sans HK', sans-serif;
        }
        
        [data-theme="dark"] {
            --bg-main: var(--main-bg-dark);
            --text-main: var(--main-text-dark);
            --text-muted: var(--main-text-muted-dark);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }
        
        /* Sidebar - 永遠深色 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        
        .sidebar-logo {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .sidebar-logo span { color: var(--accent); }
        
        .sidebar-subtitle {
            color: var(--sidebar-text-muted);
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }
        
        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .nav-item.active {
            background: var(--accent);
        }
        
        .nav-item .icon { font-size: 1.1rem; }
        
        .sidebar-footer {
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            color: var(--sidebar-text-muted);
            font-size: 0.85rem;
        }
        
        .theme-toggle button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--sidebar-text);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem 3rem;
            min-height: 100vh;
        }
        
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .main-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 600;
        }
        
        .new-article-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .new-article-btn:hover {
            background: var(--accent-hover);
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filters select, .filters input {
            padding: 0.6rem 1rem;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.95rem;
        }
        
        .filters input { 
            flex: 1; 
            min-width: 200px;
            background: transparent;
        }
        
        /* Article List */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .article-card {
            background: transparent;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .article-card:hover {
            border-color: var(--accent);
        }
        
        .article-card .platform {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .article-card h3 {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        
        .article-card .meta {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .article-card .preview {
            color: var(--text-muted);
            margin-top: 0.75rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        /* Article Detail */
        .article-detail {
            display: none;
        }
        
        .article-detail.active { display: block; }
        
        .back-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
        }
        
        .back-btn:hover { border-color: var(--accent); }
        
        .article-detail h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .article-detail .meta {
            color: var(--text-muted);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--text-muted);
        }
        
        .article-detail .content {
            font-family: var(--font-body);
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .article-detail .content p { margin-bottom: 1.2rem; }
        
        .article-detail .content h4 {
            font-family: var(--font-heading);
            margin: 2rem 0 0.75rem;
            color: var(--accent);
            font-size: 1.2rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Sidebar - 深色導航區 -->
    <aside class="sidebar">
        <div class="sidebar-logo">📺 TV<span>評論</span></div>
        <div class="sidebar-subtitle">創作工作室</div>
        
        <nav class="sidebar-nav">
            <div class="nav-item active">
                <span class="icon">📋</span> 全部文章
            </div>
            <div class="nav-item">
                <span class="icon">➕</span> 新建文章
            </div>
            <div class="nav-item">
                <span class="icon">🏷️</span> 分類
            </div>
            <div class="nav-item">
                <span class="icon">📊</span> 數據分析
            </div>
            <div class="nav-item">
                <span class="icon">⚙️</span> 設定
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <div class="theme-toggle">
                <span>🌙 深色模式</span>
                <button onclick="toggleTheme()">切換</button>
            </div>
        </div>
    </aside>

    <!-- Main Content - 閱讀區 -->
    <main class="main-content" id="mainView">
        <div class="main-header">
            <h1 class="main-title">全部文章</h1>
            <button class="new-article-btn">＋ 新建文章</button>
        </div>
        
        <div class="filters">
            <select id="platformFilter">
                <option value="">全部平台</option>
                <option value="TVB">TVB</option>
                <option value="ViuTV">ViuTV</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜尋文章...">
        </div>
        
        <div class="article-list" id="articleList">
            <div class="empty-state">載入中...</div>
        </div>
    </main>

    <!-- Article Detail View -->
    <main class="main-content article-detail" id="detailView">
        <button class="back-btn" onclick="showList()">← 返回列表</button>
        <div id="articleContent"></div>
    </main>

    <script>
        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }
        
        // Articles data
        const articles = [
            {
                id: 1,
                title: "《正義女神》— 佘詩曼都救唔到既節奏問題",
                platform: "TVB",
                date: "2026-03-19",
                focus: "題材定位 + 劇本深度 + 節奏問題",
                preview: "《正義女神》卡士強勁——佘詩曼回歸，陳煒、譚耀文坐鎮，再加上「《新聞女王》班底」呢個賣點...",
                content: `
<p><strong>《正義女神》卡士強勁</strong>——佘詩曼回歸，陳煒、譚耀文坐鎮，再加上「《新聞女王》班底」呢個賣點，聽落就知係TVB既年度大製作。但睇完成之後，你會發現問題唔係出在演員，而係出在劇本本身。</p>

<h4>題材定位：想講法律，結果講咗感情</h4>
<p>套劇打正旗號係「法律劇」，但睇落去，你會發現佢更似一套「情感劇」。案件本身應該有既法律辯論、道德抉擇，全部讓路俾主角既內心掙扎。呢個唔係話情感元素唔可以加，而係當法律橋段變成「推進感情既工具」，套劇既專業性就自然流失。觀眾想睇既係法庭上既攻防，實際睇到既係office入邊既情感糾葛。</p>

<h4>節奏：時快時慢，唔係大問題，但反映出結構失衡</h4>
<p>開場兩集的确幾紧凑——案件推進快、人物交代也算清晰。但進入中段後，問題就開始浮現。一來就係大案點題，跟住落去就變成單元形式，每集搞一個細case。呢種處理唔算錯，但細節明顯唔夠——案件来得快，去得更快，觀眾根本冇時間投入。有啲案件處理得太表面，仿佛只係為咗「帶出」主角既情感線咁。</p>

<h4>演員：有新鮮感，但角色深度不足</h4>
<p>新面孔既加入絕對係好消息。馬貫東、蔣祖曼呢啲新面孔確實為套劇帶來啲生氣。但問題在於，角色設定本身就缺乏深度——新人既功能往往只係「推動劇情」，而非「成為劇情」。TVB 呢幾年既問題就係咁：唔係冇新人，而係唔知點樣用新人。</p>

<h4>總結</h4>
<p>《正義女神》並非爛劇，佢有亮點——演員表現OK、題材有社會意義。但呢套劇既問題，其實就係 TVB 呢幾年既縮影：想突破，但每一步都走得戰戰競競，最終變成「有啲嘢睇，但唔係好好睇」。如果要再進一步，TVB 需要既唔係再搵多啲「第二個佘詩曼」，而係真真正正去諗：究竟觀眾想睇乜？</p>
`
            },
            {
                id: 2,
                title: "《臥底嬌娃》— 市場定位兩邊唔到岸既典型",
                platform: "TVB",
                date: "2026-03-19",
                focus: "班底實力 + 市場定位 + 製作野心",
                preview: "《臥底嬌娃》（前名《特勤女團》），由方駿钊監製、邵麗瓊編審，張曦雯，陳瀅、羅毓儀、馬貫東等主演...",
                content: `
<p><strong>《臥底嬌娃》</strong>（前名《特勤女團》），由方駿钊監製、邵麗瓊編審，張曦雯，陳瀅、羅毓儀、馬貫東等主演。題材本身有啲諗頭——臥底女團、輕鬆動作喜劇，方向擺明係想吸年輕觀眾。但睇完成套劇，你會發現問題唔係方向，而係——班底撐唔起。</p>

<h4>班底：有人，但未有足夠既說服力</h4>
<p>張曦雯，陳瀅、羅毓儀呢啲新面孔，顏值OK，亦落力。但當一套劇既成敗取決於「臥底」呢個題材既張力既時候，問題就出現——呢班演員，暫時未有足夠既氣場去 carry 咁複雜既角色設定。你會見到佢地好落力，但畀你既感覺就只係「努力但未夠」。呢個唔係演技問題，而係——TVB 既新一批演員，仲未有足夠既代表作去建立觀眾既信任。</p>

<h4>市場定位：本地定內地？一个兩邊都唔到岸既選擇</h4>
<p>呢套劇既「輕」，從製作到卡士都feel 到——佢唔係大製作，明顯係針對本地觀眾既輕喜劇。但與此同時，佢既題材（臥底、警匪）又唔係內地觀眾特別buy 既類型。呢種「想做本地，但又眼金金望住內地市場」既心態，正正就係TVB既死症——唔知自己做緊俾邊個睇。</p>

<h4>製作野心：有心，但力不足</h4>
<p>要拍臥底題材，需要足夠既情節張力、人物複雜度，同理應既製作資源。但呢套劇畀人既感覺就係「想做但做唔出」——案件設定偏簡單、人物關係冇乜層次、節奏亦欠缺緊張感。呢啲唔係態度問題，而係—— TVB 既製作資源同班底，暫時未能咁樣燒。</p>

<h4>總結</h4>
<p>《臥底嬌娃》既問題，唔係「做得差」，而係「力有不逮」。當平台既班底未夠，當市場定位仍然模糊，呢啲所謂既「新嘗試」，最終只會變成「縮水版既失望」。TVB 而家最需要既，唔係再拍幾多套呢啲「輕裝劇」，而係真真正正諗清楚——邊個先係自己既觀眾？</p>
`
            }
        ];

        // Render articles
        function renderArticles(filteredArticles) {
            const list = document.getElementById('articleList');
            
            if (filteredArticles.length === 0) {
                list.innerHTML = '<div class="empty-state">暫時未有文章</div>';
                return;
            }

            list.innerHTML = filteredArticles.map(article => `
                <div class="article-card" onclick="showArticle(${article.id})">
                    <span class="platform">${article.platform}</span>
                    <h3>${article.title}</h3>
                    <div class="meta">📅 ${article.date} | 🔍 ${article.focus}</div>
                    <p class="preview">${article.preview}</p>
                </div>
            `).join('');
        }

        // Filter articles
        function filterArticles() {
            const platform = document.getElementById('platformFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = articles.filter(article => {
                const matchPlatform = !platform || article.platform === platform;
                const matchSearch = !search || 
                    article.title.toLowerCase().includes(search) ||
                    article.focus.toLowerCase().includes(search);
                return matchPlatform && matchSearch;
            });
            
            renderArticles(filtered);
        }

        // Show article detail
        function showArticle(id) {
            const article = articles.find(a => a.id === id);
            if (!article) return;
            
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            
            document.getElementById('articleContent').innerHTML = `
                <span class="platform">${article.platform}</span>
                <h2>${article.title}</h2>
                <div class="meta">📅 ${article.date} | 🔍 ${article.focus}</div>
                <div class="content">${article.content}</div>
            `;
            
            window.scrollTo(0, 0);
        }

        // Show list
        function showList() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
        }

        // Event listeners
        document.getElementById('platformFilter').addEventListener('change', filterArticles);
        document.getElementById('searchInput').addEventListener('input', filterArticles);

        // Initial render
        renderArticles(articles);
    </script>
</body>
</html>
