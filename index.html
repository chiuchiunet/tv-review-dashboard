<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Live Dashboard</title>
    <style>
        :root {
            --bg-primary: #15151e;
            --bg-secondary: #1e1e2e;
            --bg-card: #252538;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #e10600;
            --accent-hover: #ff3030;
            --success: #00ff88;
            --warning: #ffcc00;
            --border: #333350;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1 span {
            color: var(--accent);
        }

        .refresh-indicator {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .refresh-indicator.refreshing {
            color: var(--warning);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Positions Table */
        .positions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .positions-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .positions-table td {
            padding: 0.625rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .positions-table tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .pos {
            font-weight: 700;
            width: 40px;
        }

        .driver {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .driver-code {
            font-weight: 600;
            color: var(--text-primary);
        }

        .driver-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .team-color {
            width: 4px;
            height: 24px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .gap {
            font-family: monospace;
            color: var(--text-secondary);
        }

        .gap.leader {
            color: var(--success);
        }

        /* Lap Times */
        .lap-table {
            width: 100%;
            border-collapse: collapse;
        }

        .lap-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .lap-table td {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
        }

        .lap-time {
            font-weight: 600;
        }

        .lap-time.fastest {
            color: var(--success);
        }

        .sector {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Pit Stops */
        .pit-table {
            width: 100%;
            border-collapse: collapse;
        }

        .pit-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .pit-table td {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .pit-stop {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .pit-time {
            font-family: monospace;
        }

        .pit-time.good {
            color: var(--success);
        }

        .pit-time.bad {
            color: var(--accent);
        }

        /* Driver Comparison */
        .comparison-selectors {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .comparison-selectors select {
            flex: 1;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th, .comparison-table td {
            padding: 0.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .comparison-table th {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .comparison-table td {
            font-family: monospace;
        }

        .comparison-table td.driver-cell {
            font-weight: 600;
        }

        /* Team Standings */
        .team-table {
            width: 100%;
            border-collapse: collapse;
        }

        .team-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .team-table td {
            padding: 0.625rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .team-entry {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .team-logo {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.7rem;
        }

        .team-name {
            font-weight: 600;
        }

        .team-points {
            font-family: monospace;
            font-weight: 600;
            color: var(--accent);
        }

        /* Loading & Error States */
        .loading, .error, .no-data {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .error {
            color: var(--accent);
        }

        .no-data {
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .tab-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏎️ F1 <span>Live Dashboard</span></h1>
        <div class="refresh-indicator" id="refreshIndicator">Last updated: --</div>
    </header>

    <main class="container">
        <div class="grid">
            <!-- Live Positions -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🏎️ Live Positions</div>
                </div>
                <div id="positions">
                    <div class="loading">Loading positions...</div>
                </div>
            </div>

            <!-- Lap Times -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">⏱️ Lap Times</div>
                </div>
                <div id="lapTimes">
                    <div class="loading">Loading lap times...</div>
                </div>
            </div>

            <!-- Pit Stops -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🛞 Pit Stops</div>
                </div>
                <div id="pitStops">
                    <div class="loading">Loading pit stops...</div>
                </div>
            </div>

            <!-- Driver Comparison -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">👥 Driver Comparison</div>
                </div>
                <div class="comparison-selectors">
                    <select id="driver1">
                        <option value="">Select Driver 1</option>
                    </select>
                    <select id="driver2">
                        <option value="">Select Driver 2</option>
                    </select>
                </div>
                <div id="comparison">
                    <div class="no-data">Select two drivers to compare</div>
                </div>
            </div>

            <!-- Team Standings -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <div class="card-title">🏁 Constructor Standings</div>
                </div>
                <div id="teamStandings">
                    <div class="loading">Loading team standings...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // F1 Dashboard - OpenF1 API Integration
        const API_BASE = 'https://api.openf1.org/v1';
        
        // Team colors (2026 season approximation)
        const TEAM_COLORS = {
            'mercedes': '#27f4d2',
            'red_bull racing': '#3671c6',
            'ferrari': '#e8002d',
            'mclaren': '#ff8000',
            'aston_martin': '#229971',
            'alpine': '#ff87bc',
            'williams': '#64c4ff',
            'rb': '#6692ff',
            'kick_sauber': '#52e252',
            'haas': '#b6babd'
        };

        const DRIVER_NAMES = {
            'VER': 'Max Verstappen',
            'PER': 'Sergio Perez',
            'LEC': 'Charles Leclerc',
            'HAM': 'Lewis Hamilton',
            'RUS': 'George Russell',
            'NOR': 'Lando Norris',
            'PIA': 'Oscar Piastri',
            'BOT': 'Valtteri Bottas',
            'ZHO': 'Zhou Guanyu',
            'MAG': 'Kevin Magnussen',
            'ALO': 'Fernando Alonso',
            'STR': 'Lance Stroll',
            'GAS': 'Pierre Gasly',
            'OCO': 'Esteban Ocon',
            'ALB': 'Alex Albon',
            'COL': 'Franco Colapinto',
            'TSU': 'Yuki Tsunoda',
            'LAW': 'Liam Lawson',
            'DEV': 'Nyck de Vries'
        };

        let cachedData = {
            positions: [],
            laps: [],
            pit: [],
            drivers: [],
            intervals: []
        };

        // Fetch helpers
        async function fetchWithTimeout(url, timeout = 10000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                return response.json();
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        // Get team color
        function getTeamColor(teamName) {
            if (!teamName) return '#ffffff';
            const key = teamName.toLowerCase().replace(/\s+/g, '_');
            return TEAM_COLORS[key] || '#ffffff';
        }

        // Format lap time
        function formatLapTime(seconds) {
            if (!seconds) return '--';
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(3);
            return mins > 0 ? `${mins}:${secs.padStart(6, '0')}` : secs;
        }

        // Format time delta
        function formatGap(seconds) {
            if (!seconds || seconds === 0) return 'Leader';
            if (seconds < 60) return `+${seconds.toFixed(1)}s`;
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(0);
            return `+${mins}:${secs.padStart(2, '0')}`;
        }

        // Render Positions
        async function loadPositions() {
            const container = document.getElementById('positions');
            try {
                const [positions, drivers, intervals] = await Promise.all([
                    fetchWithTimeout(`${API_BASE}/position`),
                    fetchWithTimeout(`${API_BASE}/drivers`),
                    fetchWithTimeout(`${API_BASE}/intervals`).catch(() => [])
                ]);

                if (!positions || positions.length === 0) {
                    container.innerHTML = '<div class="no-data">No race in progress</div>';
                    return;
                }

                // Get driver info map
                const driverMap = {};
                drivers.forEach(d => {
                    driverMap[d.driver_number] = d;
                });

                // Get interval map
                const intervalMap = {};
                intervals.forEach(i => {
                    intervalMap[i.driver_number] = i;
                });

                // Sort by position
                const sorted = [...positions].sort((a, b) => a.position - b.position);

                let html = `
                    <table class="positions-table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Driver</th>
                                <th>Gap</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                sorted.forEach((pos, idx) => {
                    const driver = driverMap[pos.driver_number];
                    const interval = intervalMap[pos.driver_number];
                    const team = driver?.team_name || 'Unknown';
                    const color = getTeamColor(team);
                    const name = driver ? `${driver.first_name} ${driver.last_name}` : `Driver ${pos.driver_number}`;
                    const code = driver?.driver_code || `${pos.driver_number}`;
                    const gap = idx === 0 ? 'Leader' : formatGap(interval?.gap_to_leader);

                    html += `
                        <tr>
                            <td class="pos">${pos.position}</td>
                            <td>
                                <div class="driver">
                                    <div class="team-color" style="background: ${color}"></div>
                                    <div>
                                        <div class="driver-code">${code}</div>
                                        <div class="driver-name">${name}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="gap ${idx === 0 ? 'leader' : ''}">${gap}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
                cachedData.positions = sorted;
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading positions: ${error.message}</div>`;
            }
        }

        // Render Lap Times
        async function loadLapTimes() {
            const container = document.getElementById('lapTimes');
            try {
                const laps = await fetchWithTimeout(`${API_BASE}/laps`);
                
                if (!laps || laps.length === 0) {
                    container.innerHTML = '<div class="no-data">No lap data available</div>';
                    return;
                }

                // Get latest lap for each driver
                const latestLaps = {};
                laps.forEach(lap => {
                    const key = lap.driver_number;
                    if (!latestLaps[key] || lap.lap_number > latestLaps[key].lap_number) {
                        latestLaps[key] = lap;
                    }
                });

                // Convert to array and sort by lap time
                const sorted = Object.values(latestLaps)
                    .filter(l => l.lap_duration)
                    .sort((a, b) => a.lap_duration - b.lap_duration);

                const fastestTime = sorted[0]?.lap_duration;

                let html = `
                    <table class="lap-table">
                        <thead>
                            <tr>
                                <th>Driver</th>
                                <th>Lap</th>
                                <th>Time</th>
                                <th>S1</th>
                                <th>S2</th>
                                <th>S3</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                sorted.slice(0, 20).forEach(lap => {
                    const isFastest = lap.lap_duration === fastestTime;
                    const code = lap.driver_code || `${lap.driver_number}`;
                    
                    html += `
                        <tr>
                            <td class="driver-code">${code}</td>
                            <td>${lap.lap_number}</td>
                            <td class="lap-time ${isFastest ? 'fastest' : ''}">${formatLapTime(lap.lap_duration)}</td>
                            <td class="sector">${lap.sector_1_duration ? formatLapTime(lap.sector_1_duration) : '-'}</td>
                            <td class="sector">${lap.sector_2_duration ? formatLapTime(lap.sector_2_duration) : '-'}</td>
                            <td class="sector">${lap.sector_3_duration ? formatLapTime(lap.sector_3_duration) : '-'}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
                cachedData.laps = sorted;
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading lap times: ${error.message}</div>`;
            }
        }

        // Render Pit Stops
        async function loadPitStops() {
            const container = document.getElementById('pitStops');
            try {
                const pits = await fetchWithTimeout(`${API_BASE}/pit`);
                
                if (!pits || pits.length === 0) {
                    container.innerHTML = '<div class="no-data">No pit stop data available</div>';
                    return;
                }

                // Sort by pit stop time (newest first)
                const sorted = [...pits].sort((a, b) => new Date(b.pit_in_time) - new Date(a.pit_in_time));

                let html = `
                    <table class="pit-table">
                        <thead>
                            <tr>
                                <th>Driver</th>
                                <th>Stop</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                sorted.slice(0, 15).forEach(pit => {
                    const code = pit.driver_code || `${pit.driver_number}`;
                    const pitTime = pit.pit_duration ? pit.pit_duration.toFixed(2) : '--';
                    const timeClass = pit.pit_duration < 22 ? 'good' : pit.pit_duration > 28 ? 'bad' : '';
                    
                    html += `
                        <tr>
                            <td class="driver-code">${code}</td>
                            <td><span class="pit-stop">${pit.pit_stop_number}</span></td>
                            <td class="pit-time ${timeClass}">${pitTime}s</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
                cachedData.pit = sorted;
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading pit stops: ${error.message}</div>`;
            }
        }

        // Load drivers for comparison
        async function loadDriversForComparison() {
            try {
                const drivers = await fetchWithTimeout(`${API_BASE}/drivers`);
                
                if (!drivers || drivers.length === 0) return;

                const select1 = document.getElementById('driver1');
                const select2 = document.getElementById('driver2');

                // Get unique drivers from positions
                const uniqueDrivers = [...new Set(cachedData.positions.map(p => p.driver_number))]
                    .map(num => drivers.find(d => d.driver_number === num))
                    .filter(d => d);

                uniqueDrivers.forEach(driver => {
                    const code = driver.driver_code;
                    const name = `${driver.first_name} ${driver.last_name}`;
                    const option = `<option value="${code}">${code} - ${name}</option>`;
                    select1.innerHTML += option;
                    select2.innerHTML += option;
                });

                // Add event listeners
                select1.addEventListener('change', updateComparison);
                select2.addEventListener('change', updateComparison);

            } catch (error) {
                console.error('Error loading drivers:', error);
            }
        }

        // Update driver comparison
        async function updateComparison() {
            const driver1 = document.getElementById('driver1').value;
            const driver2 = document.getElementById('driver2').value;
            const container = document.getElementById('comparison');

            if (!driver1 || !driver2) {
                container.innerHTML = '<div class="no-data">Select two drivers to compare</div>';
                return;
            }

            try {
                const laps = await fetchWithTimeout(`${API_BASE}/laps`);
                
                if (!laps || laps.length === 0) {
                    container.innerHTML = '<div class="no-data">No lap data available</div>';
                    return;
                }

                // Filter laps for selected drivers
                const d1Laps = laps.filter(l => l.driver_code === driver1).sort((a, b) => b.lap_number - a.lap_number);
                const d2Laps = laps.filter(l => l.driver_code === driver2).sort((a, b) => b.lap_number - a.lap_number);

                // Get last 5 laps for each
                const d1Recent = d1Laps.slice(0, 5);
                const d2Recent = d2Laps.slice(0, 5);

                let html = `
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>Lap</th>
                                <th class="driver-cell">${driver1}</th>
                                <th class="driver-cell">${driver2}</th>
                                <th>Diff</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                const maxLaps = Math.max(d1Recent.length, d2Recent.length);
                for (let i = 0; i < maxLaps; i++) {
                    const l1 = d1Recent[i];
                    const l2 = d2Recent[i];
                    const lapNum = l1?.lap_number || l2?.lap_number || i + 1;
                    
                    const time1 = l1?.lap_duration ? formatLapTime(l1.lap_duration) : '-';
                    const time2 = l2?.lap_duration ? formatLapTime(l2.lap_duration) : '-';
                    
                    let diff = '-';
                    if (l1?.lap_duration && l2?.lap_duration) {
                        const d = l1.lap_duration - l2.lap_duration;
                        diff = d > 0 ? `+${d.toFixed(3)}` : d.toFixed(3);
                    }

                    html += `
                        <tr>
                            <td>${lapNum}</td>
                            <td>${time1}</td>
                            <td>${time2}</td>
                            <td>${diff}</td>
                        </tr>
                    `;
                }

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = `<div class="error">Error loading comparison: ${error.message}</div>`;
            }
        }

        // Team Standings (simulated - OpenF1 doesn't have championship data)
        async function loadTeamStandings() {
            const container = document.getElementById('teamStandings');
            try {
                const drivers = await fetchWithTimeout(`${API_BASE}/drivers`);
                const positions = await fetchWithTimeout(`${API_BASE}/position`).catch(() => []);
                
                if (!drivers || drivers.length === 0) {
                    container.innerHTML = '<div class="no-data">No driver data available</div>';
                    return;
                }

                // Calculate team points based on current positions (simulation)
                const teamPoints = {};
                drivers.forEach(d => {
                    if (!teamPoints[d.team_name]) {
                        teamPoints[d.team_name] = 0;
                    }
                });

                // Assign points based on current positions
                const points = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
                positions.forEach((pos, idx) => {
                    if (idx < points.length) {
                        const driver = drivers.find(d => d.driver_number === pos.driver_number);
                        if (driver && driver.team_name) {
                            teamPoints[driver.team_name] += points[idx];
                        }
                    }
                });

                // Sort teams by points
                const sorted = Object.entries(teamPoints)
                    .sort((a, b) => b[1] - a[1]);

                let html = `
                    <table class="team-table">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Team</th>
                                <th>Points</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                sorted.forEach(([team, points], idx) => {
                    const color = getTeamColor(team);
                    html += `
                        <tr>
                            <td class="pos">${idx + 1}</td>
                            <td>
                                <div class="team-entry">
                                    <div class="team-logo" style="background: ${color}">${team.substring(0, 3).toUpperCase()}</div>
                                    <div class="team-name">${team}</div>
                                </div>
                            </td>
                            <td class="team-points">${points}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = `<div class="error">Error loading standings: ${error.message}</div>`;
            }
        }

        // Update refresh indicator
        function updateRefreshIndicator() {
            const indicator = document.getElementById('refreshIndicator');
            const now = new Date();
            indicator.textContent = `Last updated: ${now.toLocaleTimeString()}`;
            indicator.classList.add('refreshing');
            setTimeout(() => indicator.classList.remove('refreshing'), 500);
        }

        // Main refresh function
        async function refresh() {
            updateRefreshIndicator();
            await Promise.all([
                loadPositions(),
                loadLapTimes(),
                loadPitStops(),
                loadTeamStandings()
            ]);
            await loadDriversForComparison();
        }

        // Initial load
        refresh();

        // Auto-refresh every 5 seconds
        setInterval(refresh, 5000);
    </script>
</body>
</html>
