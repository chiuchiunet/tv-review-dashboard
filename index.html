<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Live Dashboard</title>
    <style>
        :root {
            --bg-primary: #15151e;
            --bg-secondary: #1e1e2e;
            --bg-card: #252538;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #e10600;
            --accent-hover: #ff3030;
            --success: #00ff88;
            --warning: #ffcc00;
            --border: #333350;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header h1 span { color: var(--accent); }
        .refresh-indicator {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .refresh-indicator.refreshing { color: var(--warning); }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .positions-table, .lap-table, .pit-table, .comparison-table, .team-table {
            width: 100%;
            border-collapse: collapse;
        }
        .positions-table th, .lap-table th, .pit-table th, .comparison-table th, .team-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .positions-table td, .lap-table td, .pit-table td, .comparison-table td, .team-table td {
            padding: 0.625rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .positions-table tr:hover, .lap-table tr:hover { background: rgba(255,255,255,0.03); }
        .pos { font-weight: 700; width: 40px; }
        .driver { display: flex; align-items: center; gap: 0.5rem; }
        .driver-code { font-weight: 600; }
        .driver-name { font-size: 0.8rem; color: var(--text-secondary); }
        .team-color { width: 4px; height: 24px; border-radius: 2px; flex-shrink: 0; }
        .gap { font-family: monospace; color: var(--text-secondary); }
        .gap.leader { color: var(--success); }
        .lap-time { font-weight: 600; font-family: monospace; }
        .lap-time.fastest { color: var(--success); }
        .sector { color: var(--text-secondary); font-size: 0.85rem; }
        .pit-stop {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pit-time { font-family: monospace; }
        .pit-time.good { color: var(--success); }
        .pit-time.bad { color: var(--accent); }
        .comparison-selectors {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .comparison-selectors select {
            flex: 1;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .team-entry { display: flex; align-items: center; gap: 0.75rem; }
        .team-logo {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.7rem;
        }
        .team-name { font-weight: 600; }
        .team-points { font-family: monospace; font-weight: 600; color: var(--accent); }
        .loading, .error, .no-data { text-align: center; padding: 2rem; color: var(--text-secondary); }
        .error { color: var(--accent); }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .grid { grid-template-columns: 1fr; }
            .header { padding: 1rem; }
            .header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏎️ F1 <span>Live Dashboard</span></h1>
        <div class="refresh-indicator" id="refreshIndicator">Last updated: --</div>
    </header>
    <main class="container">
        <div class="grid">
            <div class="card">
                <div class="card-header"><div class="card-title">🏎️ Live Positions</div></div>
                <div id="positions"><div class="loading">Loading positions...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">⏱️ Lap Times</div></div>
                <div id="lapTimes"><div class="loading">Loading lap times...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🛞 Pit Stops</div></div>
                <div id="pitStops"><div class="loading">Loading pit stops...</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">👥 Driver Comparison</div></div>
                <div class="comparison-selectors">
                    <select id="driver1"><option value="">Select Driver 1</option></select>
                    <select id="driver2"><option value="">Select Driver 2</option></select>
                </div>
                <div id="comparison"><div class="no-data">Select two drivers to compare</div></div>
            </div>
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header"><div class="card-title">🏁 Constructor Standings</div></div>
                <div id="teamStandings"><div class="loading">Loading team standings...</div></div>
            </div>
        </div>
    </main>
    <script>
        const API_BASE = 'https://api.openf1.org/v1';
        const TEAM_COLORS = {
            'mercedes': '#27f4d2', 'red_bull_racing': '#3671c6', 'ferrari': '#e8002d',
            'mclaren': '#ff8000', 'aston_martin': '#229971', 'alpine': '#ff87bc',
            'williams': '#64c4ff', 'rb': '#6692ff', 'kick_sauber': '#52e252', 'haas': '#b6babd'
        };
        
        let currentSessionKey = null;
        let cachedData = { positions: [], laps: [], pit: [], drivers: [], intervals: [] };

        async function fetchWithTimeout(url, timeout = 15000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        async function getLatestSession() {
            try {
                const sessions = await fetchWithTimeout(`${API_BASE}/sessions?year=2026&session_type=Race`);
                if (sessions && sessions.length > 0) {
                    // Get the most recent race session
                    currentSessionKey = sessions[0].session_key;
                    return currentSessionKey;
                }
            } catch (e) {
                console.log('No session found, trying any session...');
            }
            return null;
        }

        function getTeamColor(teamName) {
            if (!teamName) return '#ffffff';
            const key = teamName.toLowerCase().replace(/\s+/g, '_');
            return TEAM_COLORS[key] || '#ffffff';
        }

        function formatLapTime(seconds) {
            if (!seconds) return '--';
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(3);
            return mins > 0 ? `${mins}:${secs.padStart(6, '0')}` : secs;
        }

        function formatGap(seconds) {
            if (!seconds || seconds === 0) return 'Leader';
            if (seconds < 60) return `+${seconds.toFixed(1)}s`;
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(0);
            return `+${mins}:${secs.padStart(2, '0')}`;
        }

        async function loadPositions() {
            const container = document.getElementById('positions');
            try {
                let url = `${API_BASE}/position`;
                if (currentSessionKey) url += `?session_key=${currentSessionKey}`;
                const positions = await fetchWithTimeout(url);
                const drivers = await fetchWithTimeout(`${API_BASE}/drivers`);
                let intervals = [];
                try {
                    if (currentSessionKey) {
                        intervals = await fetchWithTimeout(`${API_BASE}/intervals?session_key=${currentSessionKey}`);
                    }
                } catch(e) { intervals = []; }

                if (!positions || positions.length === 0) {
                    container.innerHTML = '<div class="no-data">No race in progress</div>';
                    return;
                }

                const driverMap = {};
                if (Array.isArray(drivers)) drivers.forEach(d => driverMap[d.driver_number] = d);
                const intervalMap = {};
                if (Array.isArray(intervals)) intervals.forEach(i => intervalMap[i.driver_number] = i);

                const sorted = [...positions].sort((a, b) => a.position - b.position);
                let html = '<table class="positions-table"><thead><tr><th>Pos</th><th>Driver</th><th>Gap</th></tr></thead><tbody>';
                sorted.forEach((pos, idx) => {
                    const driver = driverMap[pos.driver_number];
                    const interval = intervalMap[pos.driver_number];
                    const team = driver?.team_name || 'Unknown';
                    const color = getTeamColor(team);
                    const name = driver ? `${driver.first_name} ${driver.last_name}` : `Driver ${pos.driver_number}`;
                    const code = driver?.driver_code || `${pos.driver_number}`;
                    const gap = idx === 0 ? 'Leader' : formatGap(interval?.gap_to_leader);
                    html += `<tr><td class="pos">${pos.position}</td><td><div class="driver"><div class="team-color" style="background:${color}"></div><div><div class="driver-code">${code}</div><div class="driver-name">${name}</div></div></div></td><td class="gap ${idx===0?'leader':''}">${gap}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
                cachedData.positions = sorted;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function loadLapTimes() {
            const container = document.getElementById('lapTimes');
            try {
                let url = `${API_BASE}/laps`;
                if (currentSessionKey) url += `?session_key=${currentSessionKey}`;
                const laps = await fetchWithTimeout(url);
                
                if (!Array.isArray(laps) || laps.length === 0) {
                    container.innerHTML = '<div class="no-data">No lap data available</div>';
                    return;
                }

                const latestLaps = {};
                laps.forEach(lap => {
                    const key = lap.driver_number;
                    if (!latestLaps[key] || lap.lap_number > latestLaps[key].lap_number) latestLaps[key] = lap;
                });

                const sorted = Object.values(latestLaps).filter(l => l.lap_duration).sort((a, b) => a.lap_duration - b.lap_duration);
                const fastestTime = sorted[0]?.lap_duration;

                let html = '<table class="lap-table"><thead><tr><th>Driver</th><th>Lap</th><th>Time</th><th>S1</th><th>S2</th><th>S3</th></tr></thead><tbody>';
                sorted.slice(0, 20).forEach(lap => {
                    const isFastest = lap.lap_duration === fastestTime;
                    const code = lap.driver_code || `${lap.driver_number}`;
                    html += `<tr><td class="driver-code">${code}</td><td>${lap.lap_number}</td><td class="lap-time ${isFastest?'fastest':''}">${formatLapTime(lap.lap_duration)}</td><td class="sector">${lap.sector_1_duration?formatLapTime(lap.sector_1_duration):'-'}</td><td class="sector">${lap.sector_2_duration?formatLapTime(lap.sector_2_duration):'-'}</td><td class="sector">${lap.sector_3_duration?formatLapTime(lap.sector_3_duration):'-'}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
                cachedData.laps = sorted;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function loadPitStops() {
            const container = document.getElementById('pitStops');
            try {
                let url = `${API_BASE}/pit`;
                if (currentSessionKey) url += `?session_key=${currentSessionKey}`;
                const pits = await fetchWithTimeout(url);
                
                if (!Array.isArray(pits) || pits.length === 0) {
                    container.innerHTML = '<div class="no-data">No pit stop data</div>';
                    return;
                }

                const sorted = [...pits].sort((a, b) => new Date(b.pit_in_time) - new Date(a.pit_in_time));
                let html = '<table class="pit-table"><thead><tr><th>Driver</th><th>Stop</th><th>Time</th></tr></thead><tbody>';
                sorted.slice(0, 15).forEach(pit => {
                    const code = pit.driver_code || `${pit.driver_number}`;
                    const pitTime = pit.pit_duration ? pit.pit_duration.toFixed(2) : '--';
                    const timeClass = pit.pit_duration < 22 ? 'good' : pit.pit_duration > 28 ? 'bad' : '';
                    html += `<tr><td class="driver-code">${code}</td><td><span class="pit-stop">${pit.pit_stop_number}</span></td><td class="pit-time ${timeClass}">${pitTime}s</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function loadDriversForComparison() {
            try {
                const drivers = await fetchWithTimeout(`${API_BASE}/drivers`);
                if (!Array.isArray(drivers) || drivers.length === 0) return;

                const select1 = document.getElementById('driver1');
                const select2 = document.getElementById('driver2');
                const uniqueDrivers = [...new Set(cachedData.positions.map(p => p.driver_number))].map(num => drivers.find(d => d.driver_number === num)).filter(d => d);

                uniqueDrivers.forEach(driver => {
                    const code = driver.driver_code;
                    const name = `${driver.first_name} ${driver.last_name}`;
                    const option = `<option value="${code}">${code} - ${name}</option>`;
                    select1.innerHTML += option;
                    select2.innerHTML += option;
                });

                select1.addEventListener('change', updateComparison);
                select2.addEventListener('change', updateComparison);
            } catch (error) { console.error('Error loading drivers:', error); }
        }

        async function updateComparison() {
            const driver1 = document.getElementById('driver1').value;
            const driver2 = document.getElementById('driver2').value;
            const container = document.getElementById('comparison');

            if (!driver1 || !driver2) {
                container.innerHTML = '<div class="no-data">Select two drivers to compare</div>';
                return;
            }

            try {
                let url = `${API_BASE}/laps`;
                if (currentSessionKey) url += `?session_key=${currentSessionKey}`;
                const laps = await fetchWithTimeout(url);
                
                if (!Array.isArray(laps) || laps.length === 0) {
                    container.innerHTML = '<div class="no-data">No lap data available</div>';
                    return;
                }

                const d1Laps = laps.filter(l => l.driver_code === driver1).sort((a, b) => b.lap_number - a.lap_number);
                const d2Laps = laps.filter(l => l.driver_code === driver2).sort((a, b) => b.lap_number - a.lap_number);
                const d1Recent = d1Laps.slice(0, 5);
                const d2Recent = d2Laps.slice(0, 5);

                let html = '<table class="comparison-table"><thead><tr><th>Lap</th><th class="driver-cell">'+driver1+'</th><th class="driver-cell">'+driver2+'</th><th>Diff</th></tr></thead><tbody>';
                const maxLaps = Math.max(d1Recent.length, d2Recent.length);
                for (let i = 0; i < maxLaps; i++) {
                    const l1 = d1Recent[i], l2 = d2Recent[i];
                    const lapNum = l1?.lap_number || l2?.lap_number || i + 1;
                    const time1 = l1?.lap_duration ? formatLapTime(l1.lap_duration) : '-';
                    const time2 = l2?.lap_duration ? formatLapTime(l2.lap_duration) : '-';
                    let diff = '-';
                    if (l1?.lap_duration && l2?.lap_duration) {
                        const d = l1.lap_duration - l2.lap_duration;
                        diff = d > 0 ? `+${d.toFixed(3)}` : d.toFixed(3);
                    }
                    html += `<tr><td>${lapNum}</td><td>${time1}</td><td>${time2}</td><td>${diff}</td></tr>`;
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function loadTeamStandings() {
            const container = document.getElementById('teamStandings');
            try {
                const drivers = await fetchWithTimeout(`${API_BASE}/drivers`);
                let positions = [];
                try {
                    let url = `${API_BASE}/position`;
                    if (currentSessionKey) url += `?session_key=${currentSessionKey}`;
                    positions = await fetchWithTimeout(url);
                } catch(e) { positions = []; }
                
                if (!Array.isArray(drivers) || drivers.length === 0) {
                    container.innerHTML = '<div class="no-data">No driver data</div>';
                    return;
                }

                const teamPoints = {};
                drivers.forEach(d => { if (d.team_name && !teamPoints[d.team_name]) teamPoints[d.team_name] = 0; });

                const points = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
                if (Array.isArray(positions)) {
                    positions.forEach((pos, idx) => {
                        if (idx < points.length) {
                            const driver = drivers.find(d => d.driver_number === pos.driver_number);
                            if (driver && driver.team_name) teamPoints[driver.team_name] += points[idx];
                        }
                    });
                }

                const sorted = Object.entries(teamPoints).sort((a, b) => b[1] - a[1]);
                let html = '<table class="team-table"><thead><tr><th>Pos</th><th>Team</th><th>Points</th></tr></thead><tbody>';
                sorted.forEach(([team, pts], idx) => {
                    const color = getTeamColor(team);
                    html += `<tr><td class="pos">${idx+1}</td><td><div class="team-entry"><div class="team-logo" style="background:${color}">${team.substring(0,3).toUpperCase()}</div><div class="team-name">${team}</div></div></td><td class="team-points">${pts}</td></tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function updateRefreshIndicator() {
            const indicator = document.getElementById('refreshIndicator');
            indicator.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            indicator.classList.add('refreshing');
            setTimeout(() => indicator.classList.remove('refreshing'), 500);
        }

        async function refresh() {
            // Try to get session first if we don't have one
            if (!currentSessionKey) await getLatestSession();
            updateRefreshIndicator();
            await Promise.all([loadPositions(), loadLapTimes(), loadPitStops(), loadTeamStandings()]);
            await loadDriversForComparison();
        }

        // Initial load
        refresh();
        // Auto-refresh every 30 seconds to avoid rate limit
        setInterval(refresh, 30000);
    </script>
</body>
</html>
